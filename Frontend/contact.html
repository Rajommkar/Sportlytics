<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sportlytics | Contact Support</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/shared.css">
</head>
<body>
<div class="particles" id="particles"></div>
<nav style="width:100%;height:64px;position:sticky;top:0;z-index:50;background:rgba(6,14,32,0.7);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 2rem;border-bottom:1px solid var(--border);">
    <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;">
        <img src="assets/logo.png" alt="Sportlytics" style="width:32px;height:32px;object-fit:contain">
        <span class="font-headline" style="font-size:1.5rem;font-weight:800;color:var(--primary);">Sportlytics</span>
    </a>
</nav>

<main style="max-width:600px;margin:3rem auto;padding:0 1.5rem;text-align:center;">
    <h1 class="font-headline" style="font-size:2.5rem;font-weight:800;margin-bottom:1rem;">Contact Us</h1>
    <div class="card" style="text-align:left;">
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;">Have questions, feature requests, or found a bug? We'd love to hear from you.</p>
        
        <form id="contact-form" onsubmit="event.preventDefault(); showToast('Message sent successfully! We will get back to you soon.', 'success'); this.reset();" style="display:flex;flex-direction:column;gap:1.25rem;">
            <div><label class="label">Name</label><input type="text" class="input" required placeholder="Your Name"></div>
            <div><label class="label">Email</label><input type="email" class="input" required placeholder="your.email@example.com"></div>
            <div><label class="label">Message</label><textarea class="input" required placeholder="How can we help?" style="min-height:120px;resize:vertical;"></textarea></div>
            <button type="submit" class="btn-premium" style="align-self:flex-start;padding:0.75rem 2rem;background:var(--primary);color:#002113;font-weight:800;border-radius:9999px;border:none;">Send Message</button>
        </form>
    </div>
</main>
<div class="toast-container" id="toastContainer"></div>
<script src="js/shared.js"></script>
<script>initParticles();</script>
</body>
</html>

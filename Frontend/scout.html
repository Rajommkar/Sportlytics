<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sportlytics | Scout Report</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            .particles, nav, .btn-premium, #toastContainer, .no-print { display: none !important; }
            .card { background: white !important; border: 1px solid #ccc !important; box-shadow: none !important; margin-bottom: 20px !important; break-inside: avoid; }
            * { color: black !important; text-shadow: none !important; }
            .progress-bar-fill { background-color: #333 !important; }
        }
        .report-header { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<nav class="no-print" style="width:100%;height:64px;position:sticky;top:0;z-index:50;background:rgba(6,14,32,0.7);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;border-bottom:1px solid var(--border);">
    <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;">
        <img src="assets/logo.png" alt="Sportlytics" style="width:28px;height:28px;object-fit:contain">
        <span class="font-headline" style="font-size:1.5rem;font-weight:800;color:var(--primary);">Sportlytics</span>
    </a>
    <button onclick="window.print()" class="btn-premium" style="padding:0.5rem 1rem;background:var(--primary);color:#002113;font-weight:800;border-radius:0.5rem;border:none;">Print Report PDF</button>
</nav>

<main style="max-width:900px;margin:2rem auto;padding:0 1.5rem;">
    <div class="card" id="report-container">
        <div class="report-header">
            <h1 class="font-headline" style="font-size:2.5rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;" id="r-name">ATHLETE NAME</h1>
            <p style="font-weight:700;letter-spacing:3px;color:var(--text-muted);margin-top:0.5rem;">OFFICIAL SCOUTING REPORT • SPORTLYTICS</p>
        </div>

        <h3 style="font-size:1.2rem;font-weight:800;border-bottom:1px solid var(--border);padding-bottom:0.5rem;margin-bottom:1rem;color:var(--primary);">OVERVIEW</h3>
        <div class="data-grid" style="margin-bottom:2rem;">
            <div><span style="color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;font-weight:700;">Efficiency Score</span><div style="font-size:1.5rem;font-weight:900;" id="r-score">0</div></div>
            <div><span style="color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;font-weight:700;">Total Matches</span><div style="font-size:1.5rem;font-weight:900;" id="r-matches">0</div></div>
            <div><span style="color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;font-weight:700;">Sports Profiling</span><div style="font-size:1.5rem;font-weight:900;" id="r-sports">0</div></div>
            <div><span style="color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;font-weight:700;">Current Club/Team</span><div style="font-size:1.5rem;font-weight:900;" id="r-team">None</div></div>
        </div>

        <h3 style="font-size:1.2rem;font-weight:800;border-bottom:1px solid var(--border);padding-bottom:0.5rem;margin-bottom:1rem;color:var(--primary);">TACTICAL BREAKDOWN</h3>
        <div id="r-tactical" style="margin-bottom:2rem;font-size:0.9rem;line-height:1.6;"></div>

        <h3 style="font-size:1.2rem;font-weight:800;border-bottom:1px solid var(--border);padding-bottom:0.5rem;margin-bottom:1rem;color:var(--primary);">ACHIEVEMENTS PORTFOLIO</h3>
        <div id="r-badges" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:2rem;"></div>

        <div style="margin-top:3rem;text-align:center;font-size:0.75rem;color:var(--text-muted);border-top:1px solid var(--border);padding-top:1rem;">
            Generated by Sportlytics Data Analytics Engine • sportlytics.app
        </div>
    </div>
</main>
<script src="js/shared.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');
    
    async function initReport() {
        if (!userId) { document.body.innerHTML = '<h2 style="text-align:center;margin-top:4rem;">No Athlete ID Provided</h2>'; return; }
        try {
            const res = await fetch(`${API_URL}/public/profile/${userId}`);
            if (!res.ok) throw new Error('Not found');
            const data = await res.json();
            
            document.getElementById('r-name').innerText = data.name;
            document.getElementById('r-score').innerText = data.efficiencyScore.toFixed(1);
            document.getElementById('r-matches').innerText = data.totalMatchesLogged || 0;
            document.getElementById('r-sports').innerText = (data.sports || []).join(', ').toUpperCase() || 'UNKNOWN';
            
            if (data.team) document.getElementById('r-team').innerText = data.team.name;
            
            // Tactical
            let tacticalHtml = '';
            if (data.sportStats) {
                Object.entries(data.sportStats).forEach(([sport, stats]) => {
                    tacticalHtml += `<div style="margin-bottom:1.5rem;"><h4 style="font-size:1rem;font-weight:800;text-transform:uppercase;margin-bottom:0.5rem;">[ ${sport} ]</h4><div class="data-grid" style="background:var(--surface-highest);padding:1rem;border-radius:0.5rem;"><div><span style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;">Volume</span><div style="font-weight:800;">${stats.matchCount} caps</div></div><div><span style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;">Points Yield</span><div style="font-weight:800;">${stats.totalPoints}</div></div><div><span style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;">Peak Output</span><div style="font-weight:800;">${stats.bestScore} pts</div></div><div><span style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;">Avg Intensity</span><div style="font-weight:800;">${(stats.avgEffort || 0).toFixed(1)} / 10</div></div></div></div>`;
                });
            }
            if (!tacticalHtml) tacticalHtml = '<p>Insufficient tactical data recorded.</p>';
            document.getElementById('r-tactical').innerHTML = tacticalHtml;
            
            // Badges
            const b = document.getElementById('r-badges');
            if (data.badges && data.badges.length > 0) {
                b.innerHTML = data.badges.map(badge => `<span class="badge-chip"><span class="material-symbols-outlined" style="font-size:14px;">${badge.icon}</span>${badge.name}</span>`).join('');
            } else { b.innerHTML = '<p>No achievements documented.</p>'; }
            
        } catch(err) { document.body.innerHTML = '<h2 style="text-align:center;margin-top:4rem;">Athlete Data Unavailable (Private or Not Found)</h2>'; }
    }
    
    document.addEventListener('DOMContentLoaded', () => { initParticles(); initReport(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sportlytics | Global Leaderboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#171f33",
                        "on-background": "#dae2fd",
                        "primary": "#4edea3",
                        "on-primary-fixed": "#002113",
                        "surface-variant": "#2d3449",
                        "background": "#0b1326",
                        "surface-container-high": "#222a3d",
                        "surface-container-lowest": "#060e20",
                        "error": "#ffb4ab",
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060e20; }
        ::-webkit-scrollbar-thumb { background: #4edea3; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6ffbbe; }

        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #060e20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(78,222,163,0.15); border-top-color: #4edea3;
            border-radius: 50%; animation: loaderSpin 0.8s linear infinite; position: relative;
        }
        .loader-spinner::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; background: #4edea3; border-radius: 50%;
            animation: loaderPulse 1s ease-in-out infinite;
        }
        .loader-text { margin-top: 24px; font-weight: 800; color: #4edea3; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5rem; letter-spacing: 6px; animation: pulseText 1.5s ease-in-out infinite; }
        .loader-sub { margin-top: 8px; font-size: 0.7rem; color: rgba(218,226,253,0.4); letter-spacing: 3px; text-transform: uppercase; }
        @keyframes loaderSpin { to { transform: rotate(360deg); } }
        @keyframes loaderPulse { 0%, 100% { opacity: 0.3; transform: translate(-50%,-50%) scale(0.8); } 50% { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; width: 3px; height: 3px; background: #4edea3; border-radius: 50%; opacity: 0; animation: particleFloat 10s linear infinite; }
        @keyframes particleFloat { 0% { opacity: 0; transform: translateY(100vh); } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { opacity: 0; transform: translateY(-10vh); } }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { animation: fadeInUp 0.6s ease both; }

        /* Row hover glow */
        tr.leaderboard-row { transition: all 0.3s ease; }
        tr.leaderboard-row:hover { background: rgba(78,222,163,0.05) !important; box-shadow: inset 3px 0 0 #4edea3; }
    </style>
</head>
<body class="bg-background text-on-background selection:bg-primary selection:text-surface-container">
<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
    <div class="loader-spinner"></div>
    <div class="loader-text">SPORTLYTICS</div>
    <div class="loader-sub">Loading Rankings</div>
</div>
<!-- Particles -->
<div class="particles" id="particles"></div>

<nav class="w-full h-16 sticky top-0 z-50 bg-slate-950/50 backdrop-blur-md flex items-center justify-between px-8 md:px-12 border-b border-surface-variant/50">
    <div class="flex items-center gap-8">
        <a href="index.html" class="text-2xl font-extrabold tracking-tighter text-primary font-headline">Sportlytics</a>
        <div class="hidden md:flex gap-6 items-center">
            <a class="text-slate-300 hover:text-primary transition-colors" href="dashboard.html">Dashboard</a>
            <a class="text-primary font-bold transition-colors" href="leaderboard.html">Leaderboard</a>
        </div>
    </div>
</nav>

<main class="max-w-4xl mx-auto px-6 py-12">
    <div class="mb-12 text-center">
        <h1 class="text-5xl font-headline font-extrabold tracking-tight mb-4 text-primary">Global Leaderboard</h1>
        <p class="text-lg text-on-surface/60">The top 50 athletes across the Sportlytics network.</p>
    </div>

    <div class="bg-surface-container-high rounded-xl border border-white/5 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-surface-container text-xs uppercase tracking-widest text-on-surface/70 border-b border-white/10">
                    <th class="py-4 px-6 font-bold w-16 text-center">Rank</th>
                    <th class="py-4 px-6 font-bold">Athlete Name</th>
                    <th class="py-4 px-6 font-bold text-right">Efficiency Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr>
                    <td colspan="3" class="py-8 text-center text-sm text-on-surface/50">
                        <span class="material-symbols-outlined animate-spin text-4xl text-primary mb-2">refresh</span>
                        <p>Fetching the ranks...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    async function loadLeaderboard() {
        try {
            const res = await fetch('http://127.0.0.1:5000/api/public/leaderboard?limit=50');
            const users = await res.json();
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="py-8 text-center text-sm text-on-surface/50">No athletes ranked yet.</td></tr>';
                return;
            }

            users.forEach((u, i) => {
                let badge = `<span class="text-on-surface/50 font-bold">${i + 1}</span>`;
                if (i === 0) badge = `<span class="material-symbols-outlined text-yellow-400" title="1st Place">trophy</span>`;
                else if (i === 1) badge = `<span class="material-symbols-outlined text-gray-300" title="2nd Place">military_tech</span>`;
                else if (i === 2) badge = `<span class="material-symbols-outlined text-amber-600" title="3rd Place">military_tech</span>`;

                tbody.innerHTML += `
                <tr class="fade-in-up leaderboard-row border-b border-white/5" style="animation-delay: ${i * 0.05}s">
                    <td class="py-4 px-6 text-center">${badge}</td>
                    <td class="py-4 px-6 font-bold text-on-surface">${u.name}</td>
                    <td class="py-4 px-6 text-right font-headline font-bold text-primary">${u.efficiencyScore ? u.efficiencyScore.toFixed(1) : '0.0'}</td>
                </tr>`;
            });
        } catch (err) {
            console.error('Failed to fetch leaderboard');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Particles
        const pc = document.getElementById('particles');
        if (pc) {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 8 + 6) + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.width = (Math.random() * 3 + 1) + 'px';
                p.style.height = p.style.width;
                pc.appendChild(p);
            }
        }

        loadLeaderboard().then(() => {
            setTimeout(() => {
                const loader = document.getElementById('loadingScreen');
                if (loader) loader.classList.add('hidden');
            }, 800);
        });
    });
</script>
</body>
</html>

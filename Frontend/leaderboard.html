<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sportlytics | Global Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <meta name="description" content="See where you rank among athletes worldwide. Filter by sport, view team standings.">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        tr.lb-row { transition: all 0.3s ease; }
        tr.lb-row:hover { background: rgba(78,222,163,0.05) !important; box-shadow: inset 3px 0 0 var(--primary); }
        .filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
    <div class="loader-spinner"></div>
    <div class="loader-text">SPORTLYTICS</div>
    <div class="loader-sub">Loading Rankings</div>
</div>
<div class="particles" id="particles"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Mobile Menu -->
<div class="mobile-menu hidden" id="mobileMenu">
    <button onclick="toggleMobileMenu()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text);cursor:pointer;"><span class="material-symbols-outlined" style="font-size:2rem;">close</span></button>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="leaderboard.html" style="color:var(--primary);">Leaderboard</a>
</div>

<nav style="width:100%;height:64px;position:sticky;top:0;z-index:50;background:rgba(6,14,32,0.7);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;border-bottom:1px solid var(--border);">
    <div style="display:flex;align-items:center;gap:2rem;">
        <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;">
            <img src="assets/logo.png" alt="Sportlytics" style="width:28px;height:28px;object-fit:contain">
            <span class="font-headline" style="font-size:1.5rem;font-weight:800;color:var(--primary);letter-spacing:-0.05em;">Sportlytics</span>
        </a>
        <div style="display:none;gap:1.5rem;align-items:center;" class="desktop-nav">
            <a href="dashboard.html" style="color:var(--text-muted);font-weight:700;font-size:0.85rem;text-decoration:none;">Dashboard</a>
            <a href="leaderboard.html" style="color:var(--primary);font-weight:700;font-size:0.85rem;text-decoration:none;">Leaderboard</a>
        </div>
    </div>
    <button onclick="toggleMobileMenu()" class="mobile-nav-btn" style="background:none;border:none;color:var(--text);cursor:pointer;display:block;"><span class="material-symbols-outlined">menu</span></button>
</nav>
<style>@media(min-width:768px) { .desktop-nav { display:flex !important; } .mobile-nav-btn { display:none !important; } }</style>

<main style="max-width:900px;margin:0 auto;padding:2rem 1.5rem;">
    <div style="text-align:center;margin-bottom:2rem;">
        <h1 class="font-headline stat-value" style="font-size:3rem;-webkit-text-fill-color:var(--primary);">Global Leaderboard</h1>
        <p style="color:var(--text-muted);margin-top:0.5rem;">Top athletes across the Sportlytics network.</p>
    </div>

    <!-- Tabs: Athletes vs Teams -->
    <div style="display:flex;justify-content:center;gap:0.75rem;margin-bottom:1.5rem;">
        <button class="tab-btn active" id="tab-athletes" onclick="switchLBTab('athletes')">Athletes</button>
        <button class="tab-btn" id="tab-teams" onclick="switchLBTab('teams')">Teams</button>
    </div>

    <!-- Athletes Section -->
    <div id="athletes-section">
        <div class="filter-bar">
            <select id="lb-sport-filter" class="input" style="width:auto;padding:0.4rem 1rem;font-size:0.8rem;" onchange="loadLeaderboard()">
                <option value="all">All Sports</option>
                <option value="football">⚽ Football</option>
                <option value="basketball">🏀 Basketball</option>
                <option value="cricket">🏏 Cricket</option>
                <option value="running">🏃 Running</option>
                <option value="tennis">🎾 Tennis</option>
                <option value="swimming">🏊 Swimming</option>
                <option value="cycling">🚴 Cycling</option>
                <option value="other">💪 Other</option>
            </select>
        </div>
        <div class="card" style="padding:0;overflow:hidden;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:60px;text-align:center;">Rank</th>
                        <th>Athlete</th>
                        <th>Sports</th>
                        <th style="text-align:center;">Matches</th>
                        <th style="text-align:right;">Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Teams Section -->
    <div id="teams-section" class="hidden">
        <div class="card" style="padding:0;overflow:hidden;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:60px;text-align:center;">Rank</th>
                        <th>Team</th>
                        <th>Sport</th>
                        <th style="text-align:center;">Members</th>
                        <th style="text-align:right;">Total Score</th>
                    </tr>
                </thead>
                <tbody id="team-lb-body">
                    <tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="js/shared.js"></script>
<script>
    function switchLBTab(tab) {
        document.getElementById('athletes-section').classList.toggle('hidden', tab !== 'athletes');
        document.getElementById('teams-section').classList.toggle('hidden', tab !== 'teams');
        document.getElementById('tab-athletes').classList.toggle('active', tab === 'athletes');
        document.getElementById('tab-teams').classList.toggle('active', tab === 'teams');
        if (tab === 'teams') loadTeamLeaderboard();
    }

    async function loadLeaderboard() {
        const sport = document.getElementById('lb-sport-filter')?.value || 'all';
        try {
            const url = sport === 'all' ? `${API_URL}/public/leaderboard?limit=50` : `${API_URL}/public/leaderboard?limit=50&sport=${sport}`;
            const res = await fetch(url);
            const users = await res.json();
            const tbody = document.getElementById('leaderboard-body');
            if (users.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">No athletes ranked yet.</td></tr>'; return; }
            tbody.innerHTML = users.map((u, i) => {
                let badge = `<span style="color:var(--text-muted);font-weight:800;">${i + 1}</span>`;
                if (i === 0) badge = '<span class="material-symbols-outlined" style="color:#facc15;">trophy</span>';
                else if (i === 1) badge = '<span class="material-symbols-outlined" style="color:#d1d5db;">military_tech</span>';
                else if (i === 2) badge = '<span class="material-symbols-outlined" style="color:#d97706;">military_tech</span>';
                const sports = (u.sports || []).map(s => { const info = SPORT_OPTIONS.find(o => o.value === s); const c = SPORT_COLORS[s] || '#6b7280'; return `<span class="sport-tag" style="background:${c}22;color:${c};border:1px solid ${c}44;font-size:0.6rem;">${info ? info.label : s}</span>`; }).join('');
                return `<tr class="fade-in-up lb-row" style="animation-delay:${i*0.03}s"><td style="text-align:center;">${badge}</td><td style="font-weight:700;">${u.name}${u.badges && u.badges.length > 0 ? ' <span style="font-size:0.65rem;color:var(--text-muted);">🏅×' + u.badges.length + '</span>' : ''}</td><td>${sports || '<span style="color:var(--text-muted);font-size:0.75rem;">-</span>'}</td><td style="text-align:center;">${u.totalMatchesLogged || 0}</td><td style="text-align:right;font-weight:800;color:var(--primary);">${u.efficiencyScore ? u.efficiencyScore.toFixed(1) : '0.0'}</td></tr>`;
            }).join('');
        } catch (err) { console.error('Failed to fetch leaderboard'); }
    }

    async function loadTeamLeaderboard() {
        try {
            const res = await fetch(`${API_URL}/public/team-leaderboard?limit=20`);
            const teams = await res.json();
            const tbody = document.getElementById('team-lb-body');
            if (teams.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">No teams created yet.</td></tr>'; return; }
            tbody.innerHTML = teams.map((t, i) => {
                let badge = `<span style="color:var(--text-muted);font-weight:800;">${i+1}</span>`;
                if (i === 0) badge = '<span class="material-symbols-outlined" style="color:#facc15;">trophy</span>';
                else if (i === 1) badge = '<span class="material-symbols-outlined" style="color:#d1d5db;">military_tech</span>';
                else if (i === 2) badge = '<span class="material-symbols-outlined" style="color:#d97706;">military_tech</span>';
                const c = SPORT_COLORS[t.sport] || '#6b7280';
                return `<tr class="fade-in-up lb-row" style="animation-delay:${i*0.04}s"><td style="text-align:center;">${badge}</td><td style="font-weight:700;">${t.name}<br><span style="font-size:0.65rem;color:var(--text-muted);">Captain: ${t.captain?.name || '?'}</span></td><td><span class="sport-tag" style="background:${c}22;color:${c};border:1px solid ${c}44;">${t.sport}</span></td><td style="text-align:center;">${t.memberCount}</td><td style="text-align:right;font-weight:800;color:var(--primary);">${t.totalScore?.toFixed(1) || '0.0'}</td></tr>`;
            }).join('');
        } catch (err) { console.error(err); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initParticles();
        loadLeaderboard().then(() => { setTimeout(hideLoader, 800); });
    });
</script>
</body>
</html>

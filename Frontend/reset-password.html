<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sportlytics | Reset Password</title>
    <link rel="stylesheet" href="css/shared.css">
</head>
<body>
<div class="particles" id="particles"></div>
<div class="toast-container" id="toastContainer"></div>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div class="card" style="max-width:400px;width:100%;text-align:center;">
        <h1 class="font-headline" style="font-size:1.5rem;font-weight:800;margin-bottom:0.5rem;">Reset Password</h1>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;">Enter your new password below.</p>
        <form id="reset-form" style="text-align:left;">
            <div style="margin-bottom:1rem;"><label class="label">New Password</label><input type="password" id="new-password" class="input" required placeholder="Min 6 chars, 1 letter, 1 number"></div>
            <div style="margin-bottom:1rem;"><label class="label">Confirm Password</label><input type="password" id="confirm-password" class="input" required placeholder="Confirm password"></div>
            <button type="submit" class="btn-premium" style="width:100%;padding:0.75rem;background:var(--primary);color:#002113;font-weight:700;border-radius:0.75rem;border:1px solid var(--primary);">Reset Password</button>
        </form>
        <div id="feedback" style="margin-top:1rem;font-size:0.85rem;font-weight:700;display:none;"></div>
        <a href="index.html" style="display:inline-block;margin-top:1.5rem;color:var(--primary);font-size:0.85rem;text-decoration:none;">← Back to Sportlytics</a>
    </div>
</div>
<script src="js/shared.js"></script>
<script>
    initParticles();
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) { document.getElementById('feedback').style.display = 'block'; document.getElementById('feedback').style.color = 'var(--error)'; document.getElementById('feedback').innerText = 'Invalid reset link. No token found.'; document.getElementById('reset-form').style.display = 'none'; }

    document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('new-password').value;
        const confirm = document.getElementById('confirm-password').value;
        const fb = document.getElementById('feedback');
        if (newPassword !== confirm) { fb.style.display = 'block'; fb.style.color = 'var(--error)'; fb.innerText = 'Passwords do not match.'; return; }
        try {
            const res = await fetch(`${API_URL}/auth/reset-password`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, newPassword }) });
            const data = await res.json();
            fb.style.display = 'block';
            if (res.ok) { fb.style.color = 'var(--primary)'; fb.innerText = data.message + ' Redirecting...'; setTimeout(() => window.location.href = 'index.html', 2000); }
            else { fb.style.color = 'var(--error)'; fb.innerText = data.message; }
        } catch (err) { fb.style.display = 'block'; fb.style.color = 'var(--error)'; fb.innerText = 'Network error.'; }
    });
</script>
</body>
</html>
